apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubepulse-ingress
  namespace: kubepulse
  labels:
    app.kubernetes.io/name: kubepulse
  annotations:
    # Azure Application Gateway Ingress Controller (AGIC)
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/request-timeout: "30"
    # If using nginx ingress instead, replace annotations with:
    # kubernetes.io/ingress.class: nginx
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - kubepulse.internal.yourbank.com
      secretName: kubepulse-tls-secret
  rules:
    - host: kubepulse.internal.yourbank.com
      http:
        paths:
          # Frontend — serve UI
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubepulse-frontend
                port:
                  number: 80
          # Backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kubepulse-backend
                port:
                  number: 8080
          # Actuator (restrict to internal network via network policy)
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: kubepulse-backend
                port:
                  number: 8080
          # WebSocket
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: kubepulse-backend
                port:
                  number: 8080
