# IMPORTANT: Do NOT commit real values to source control.
# Use Azure Key Vault, sealed secrets, or External Secrets Operator in production.
# This file shows the structure only — generate real secrets with:
#   kubectl create secret generic kubepulse-secret \
#     --from-literal=username=kubepulse \
#     --from-literal=password=<STRONG_PASSWORD> \
#     --from-literal=teams-webhook-url=<TEAMS_URL> \
#     -n kubepulse
apiVersion: v1
kind: Secret
metadata:
  name: kubepulse-secret
  namespace: kubepulse
  labels:
    app.kubernetes.io/name: kubepulse
type: Opaque
stringData:
  username: kubepulse
  password: CHANGE_ME_USE_STRONG_PASSWORD
  teams-webhook-url: ""
